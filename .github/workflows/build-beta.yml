name: Build beta

env:
  SLN_PATH: Source/
  GH_REPO: ${{ github.repository }}

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - dev
    paths-ignore:
      - 'README.md'

jobs:
  build:
    name: Build beta
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
      
    - name: Setup Dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.x
      
    - name: Install Mod Dependencies
      run: dotnet restore ${{ env.SLN_PATH }}

    - name: Build Mod
      run: dotnet build ${{ env.SLN_PATH }} --configuration Release --no-restore

    - name: Package files
      run: |
        sed -i "s/<name>\(.*\)<\/name>\$/<name>\1 [Continuous]<\/name>/" About/About.xml
        mkdir -p output/Multiplayer
        mv About/ Assemblies/ AssembliesCustom/ Defs/ Languages/ Textures/ output/Multiplayer
        cd output/
        zip -r ../Multiplayer-beta.zip Multiplayer/
        cd ../

    - name: Upload Mod Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Multiplayer-beta
        path: output/
    
    - name: Clean up last release
      continue-on-error: true
      run: |
        gh release delete --repo "$GH_REPO" --cleanup-tag --yes "continuous"
    
    - name: Upload new release
      run: |
        gh release create --repo "$GH_REPO" --target "${{ github.sha }}" --title "Continuous" --notes-file ".github/workflows/alpha-notes.md" --draft "continuous"
        gh release upload --repo "$GH_REPO" "continuous" Multiplayer-beta.zip
        gh release edit --repo "$GH_REPO" "continuous" --draft=false
